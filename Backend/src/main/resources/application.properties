# ==================================================================
# Email configuration (SSL - Port 465)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=465

spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}

spring.mail.protocol=smtp

# SMTP Authentication
spring.mail.properties.mail.smtp.auth=true

# Enable SSL
spring.mail.properties.mail.smtp.ssl.enable=true

# Disable STARTTLS (not needed with SSL)
spring.mail.properties.mail.smtp.starttls.enable=false

# Optional but recommended
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# From email
spring.mail.properties.mail.smtp.from=${MAIL_FROM}

#=======================================================================

# jwt private key
jwt.secret=${JWT_SECRET}

money.manager.frontend.url=${FRONTEND_URL}
app.activation.url=${BACKEND_URL}

spring.profiles.active=prod